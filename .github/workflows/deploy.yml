name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        # SITE_URL is baked into the static export at build time — the NTS SEO
        # layer reads it for canonical/OG absolute URLs. CF Pages only serves the
        # prebuilt out/ (no CF-side build), so this Build step is the single
        # prod build-time origin; the *.pages.dev URL matches project.publishedUrl.
        run: bun run build
        env:
          SITE_URL: https://nocms-dev-company-test-senior-living-1e90f60e.pages.dev

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=nocms-dev-company-test-senior-living-1e90f60e
